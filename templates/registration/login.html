<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .btn-primary { background: #764ba2; border: none; padding: 12px; font-weight: bold; }
        .btn-primary:hover { background: #667eea; }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center fw-bold mb-4">COLLEGE ERP</h3>
        <p class="text-center text-muted mb-4">Please sign in to continue</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger small py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Enter username">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
        </form>

        <div class="mt-4 pt-3 border-top text-center small text-muted">
            Admin/Faculty/Student Portal
        </div>
    </div>

</body>
</html>
